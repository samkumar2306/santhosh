<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hello,It's Dhiya</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0d0d; --border: #242424; --accent: #c9a96e; --accent2: #8a6f43;
  --text: #e8e0d4; --muted: #7a7067; --white: #ffffff;
}
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }

/* header */
header {
  padding: 2.8rem 4rem 1.8rem;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 1.5rem; flex-wrap: wrap;
}
.h-left h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 700;
  letter-spacing: -0.02em; line-height: 1; color: var(--white);
}
.h-left h1 span { color: var(--accent); font-style: italic; }
.h-subtitle { margin-top: 0.4rem; font-size: 0.78rem; color: var(--muted); letter-spacing: 0.14em; text-transform: uppercase; }
.h-right { display: flex; align-items: center; gap: 1.2rem; flex-wrap: wrap; }
.user-chip {
  display: flex; align-items: center; gap: 0.55rem;
  background: rgba(255,255,255,0.04); border: 1px solid var(--border);
  border-radius: 2rem; padding: 0.38rem 0.85rem 0.38rem 0.45rem;
  font-size: 0.74rem; color: var(--muted);
}
.user-av {
  width: 26px; height: 26px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-size: 0.68rem; font-weight: 700; color: #0d0d0d;
}
.photo-count { text-align: right; }
.photo-count strong { display: block; font-family: 'Playfair Display', serif; font-size: 2.2rem; color: var(--accent); line-height: 1; }
.photo-count span { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.06em; }
.btn-out {
  padding: 0.42rem 0.9rem;
  background: transparent; border: 1px solid var(--border); border-radius: 6px;
  color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 0.7rem;
  font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase;
  cursor: pointer; transition: all 0.2s;
}
.btn-out:hover { border-color: rgba(201,169,110,0.4); color: var(--accent); }

/* year filter */
.year-bar {
  padding: 1.5rem 4rem; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 0.65rem; flex-wrap: wrap;
}
.year-lbl { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.15em; color: var(--muted); margin-right: 0.4rem; white-space: nowrap; }
.yr-btn {
  background: transparent; border: 1px solid var(--border); color: var(--muted);
  font-family: 'DM Sans', sans-serif; font-size: 0.78rem; font-weight: 500;
  letter-spacing: 0.05em; padding: 0.42rem 1rem; border-radius: 2rem;
  cursor: pointer; transition: all 0.22s;
}
.yr-btn:hover { border-color: var(--accent2); color: var(--accent); }
.yr-btn.active { background: var(--accent); border-color: var(--accent); color: #0d0d0d; font-weight: 600; }

/* gallery */
.gallery-wrap { padding: 2.4rem 4rem 4rem; }
.masonry { columns: 4 200px; column-gap: 1rem; }
.photo-item {
  break-inside: avoid; margin-bottom: 1rem;
  position: relative; border-radius: 7px; overflow: hidden;
  cursor: pointer; display: block;
  animation: fadeUp 0.4s ease forwards;
}
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.photo-item img { width: 100%; display: block; border-radius: 7px; transition: transform 0.4s ease; filter: brightness(0.88); }
.photo-item:hover img { transform: scale(1.04); filter: brightness(1); }
.photo-over {
  position: absolute; inset: 0; border-radius: 7px;
  background: linear-gradient(to top, rgba(0,0,0,0.68) 0%, transparent 55%);
  opacity: 0; transition: opacity 0.28s; display: flex; align-items: flex-end; padding: 0.9rem;
}
.photo-item:hover .photo-over { opacity: 1; }
.yr-tag { background: var(--accent); color: #0d0d0d; font-size: 0.62rem; font-weight: 700; letter-spacing: 0.08em; padding: 0.18rem 0.48rem; border-radius: 3px; }
.cap { color: rgba(255,255,255,0.85); font-size: 0.73rem; margin-left: 0.45rem; }
.empty-state { display: none; flex-direction: column; align-items: center; justify-content: center; padding: 6rem 2rem; text-align: center; gap: 1rem; }
.empty-state.show { display: flex; }
.empty-icon { font-size: 3rem; opacity: 0.28; }
.empty-txt { color: var(--muted); font-size: 0.88rem; }

/* lightbox */
.lb { position: fixed; inset: 0; background: rgba(0,0,0,0.97); z-index: 1000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.32s; }
.lb.open { opacity: 1; pointer-events: all; }
.lb-inner { position: relative; max-width: 92vw; max-height: 92vh; display: flex; align-items: center; justify-content: center; }
.lb-img { max-width: 100%; max-height: 88vh; border-radius: 4px; box-shadow: 0 40px 80px rgba(0,0,0,0.8); transform: scale(0.96); transition: transform 0.32s; object-fit: contain; }
.lb.open .lb-img { transform: scale(1); }
.lb-close { position: fixed; top: 1.4rem; right: 1.8rem; background: none; border: 1px solid rgba(255,255,255,0.14); color: rgba(255,255,255,0.65); width: 40px; height: 40px; border-radius: 50%; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; z-index: 1001; }
.lb-close:hover { background: rgba(255,255,255,0.1); color: #fff; }
.lb-nav { position: fixed; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.65); width: 46px; height: 46px; border-radius: 50%; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; z-index: 1001; }
.lb-nav:hover { background: rgba(255,255,255,0.14); color: #fff; }
.lb-prev { left: 1.4rem; } .lb-next { right: 1.4rem; }
.lb-info { position: fixed; bottom: 1.8rem; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 0.9rem; background: rgba(18,18,18,0.88); border: 1px solid rgba(255,255,255,0.07); backdrop-filter: blur(10px); padding: 0.55rem 1.3rem; border-radius: 2rem; z-index: 1001; }
.lb-yr { background: var(--accent); color: #0d0d0d; font-size: 0.67rem; font-weight: 700; letter-spacing: 0.1em; padding: 0.18rem 0.55rem; border-radius: 3px; }
.lb-cap { color: rgba(255,255,255,0.68); font-size: 0.78rem; }
.lb-ctr { color: var(--muted); font-size: 0.72rem; margin-left: 0.4rem; }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

@media (max-width: 600px) {
  header, .year-bar, .gallery-wrap { padding-left: 1.2rem; padding-right: 1.2rem; }
  header { padding-top: 2rem; }
  .masonry { columns: 2 140px; }
  .lb-nav { display: none; }
}
</style>

<script>

const role = sessionStorage.getItem('mg_role');
if (!role || (role !== 'guest' && role !== 'admin')) {
  window.location.href = 'login.html';
}

// ── User display ──────────────────────────────────────────
const uInfo = JSON.parse(sessionStorage.getItem('mg_user') || '{}');
const uName = role === 'admin' ? 'Admin' : (uInfo.name || 'Guest');
document.getElementById('u-name').textContent = uName;
document.getElementById('u-av').textContent   = uName[0].toUpperCase();

  sessionStorage.removeItem('mg_role');

// ── Gallery state ─────────────────────────────────────────
let activeYear  = 'all';
let filtered    = [...photos];
let lbIndex     = 0;

// Build year buttons
const years = [...new Set(photos.map(p => p.year))].sort();
const yBar  = document.querySelector('.year-bar');
years.forEach(y => {
  const b = document.createElement('button');
  b.className = 'yr-btn'; b.dataset.year = y; b.textContent = y;
  yBar.appendChild(b);
});

yBar.addEventListener('click', e => {
  const btn = e.target.closest('.yr-btn'); if (!btn) return;
  document.querySelectorAll('.yr-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeYear = btn.dataset.year === 'all' ? 'all' : parseInt(btn.dataset.year);
  renderGallery();
});

function renderGallery() {
  filtered = activeYear === 'all' ? [...photos] : photos.filter(p => p.year === activeYear);
  const grid   = document.getElementById('masonry');
  const empty  = document.getElementById('empty');
  const count  = document.getElementById('vis-count');
  grid.innerHTML = '';
  if (!filtered.length) { empty.classList.add('show'); count.textContent = 0; return; }
  empty.classList.remove('show'); count.textContent = filtered.length;

  filtered.forEach((p, i) => {
    const el = document.createElement('div');
    el.className = 'photo-item'; el.style.animationDelay = (i * 0.035) + 's';
    el.innerHTML = `<img src="${p.src}" alt="${p.caption}" loading="lazy">
      <div class="photo-over"><span class="yr-tag">${p.year}</span><span class="cap">${p.caption}</span></div>`;
    el.addEventListener('click', () => openLb(i));
    grid.appendChild(el);
  });
}

// ── Lightbox ──────────────────────────────────────────────
const lb     = document.getElementById('lb');
const lbImg  = document.getElementById('lb-img');
const lbYr   = document.getElementById('lb-yr');
const lbCap  = document.getElementById('lb-cap');
const lbCtr  = document.getElementById('lb-ctr');

function openLb(i) { lbIndex = i; updateLb(); lb.classList.add('open'); document.body.style.overflow = 'hidden'; }
function closeLb()  { lb.classList.remove('open'); document.body.style.overflow = ''; }
function prevLb()   { lbIndex = (lbIndex - 1 + filtered.length) % filtered.length; updateLb(); }
function nextLb()   { lbIndex = (lbIndex + 1) % filtered.length; updateLb(); }
function updateLb() {
  const p = filtered[lbIndex];
  lbImg.src = p.src; lbImg.alt = p.caption;
  lbYr.textContent  = p.year;
  lbCap.textContent = p.caption;
  lbCtr.textContent = `${lbIndex + 1} / ${filtered.length}`;
}

document.getElementById('lb-close').addEventListener('click', closeLb);
document.getElementById('lb-prev').addEventListener('click', prevLb);
document.getElementById('lb-next').addEventListener('click', nextLb);
lb.addEventListener('click', e => { if (e.target === lb) closeLb(); });
document.addEventListener('keydown', e => {
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape')     closeLb();
  if (e.key === 'ArrowLeft')  prevLb();
  if (e.key === 'ArrowRight') nextLb();
});

renderGallery();
</script>
